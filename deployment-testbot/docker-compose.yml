services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wger
      POSTGRES_USER: wger
      POSTGRES_PASSWORD: wger
    volumes:
      - wger-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wger"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ${UPSTREAM_CHECKOUT:-..}
      dockerfile: deployment-testbot/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      # host 8091 -> container 8000
      - "8091:8000"
    environment:
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_DATABASE: wger
      DJANGO_DB_USER: wger
      DJANGO_DB_PASSWORD: wger
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: 5432
      # Use in-memory cache (no redis needed)
      DJANGO_DEBUG: "True"
      SECRET_KEY: testbot-insecure-secret-key-not-for-prod-wger
      SIGNING_KEY: testbot-insecure-signing-key-not-for-prod-wger
      # Disable axes lockout in CI (no failed-login lockouts)
      AXES_ENABLED: "False"
      # Allow all hosts
      SITE_URL: http://localhost:8091
      # Disable celery (no worker/broker needed)
      USE_CELERY: "False"
      # Skip slow startup tasks
      SYNC_EXERCISES_ON_STARTUP: "False"
      DOWNLOAD_EXERCISE_IMAGES_ON_STARTUP: "False"
      DOWNLOAD_EXERCISE_VIDEOS_ON_STARTUP: "False"
      LOAD_ONLINE_FIXTURES_ON_STARTUP: "False"
      DJANGO_PERFORM_MIGRATIONS: "True"
      WGER_USE_GUNICORN: "True"
    volumes:
      - wger-media:/home/wger/media
      - wger-static:/home/wger/static

volumes:
  wger-postgres:
  wger-media:
  wger-static:
