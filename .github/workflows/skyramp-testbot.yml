name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  testbot:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'issue_comment' ||
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    permissions:
      contents: write
      pull-requests: write
    steps:
      # testbot v0.10.x inputs are camelCase. SUT = wger built from source on :8091
      # (Django REST, token auth: Authorization: Token <token>; OpenAPI at /api/v2/schema/).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: skyramp/testbot@v0.10.6
        with:
          skyrampLicenseFile: ${{ secrets.SKYRAMP_LICENSE_FILE }}
          anthropicApiKey: ${{ secrets.ANTHROPIC_API_KEY }}
          targetSetupCommand: './deployment-testbot/setup.sh'
          targetReadyCheckCommand: 'curl -f http://localhost:8091/api/v2/version/'
          targetReadyCheckTimeout: 900
          authTokenCommand: './deployment-testbot/get-token.sh'
          autoCommit: true
          postPrComment: true
